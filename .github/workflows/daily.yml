name: Daily Crypto Analysis

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  daily-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Run generate_analysis.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/generate_analysis.py

      - name: Run generate_daily.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/generate_daily.py --skip-api

      - name: Run auto_trade.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/auto_trade.py

      - name: Run fetch_altcoins.py (Binance API)
        run: python scripts/fetch_altcoins.py

      - name: Run fetch_altcoin_news.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/fetch_altcoin_news.py

      - name: Commit and push new content
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/pages/zh/daily/ src/pages/en/daily/ || true
          git add src/content/zh/analysis/ src/content/en/analysis/ || true
          git add src/data/latest-analysis.json || true
          git add src/data/altcoins.json || true
          git add src/data/altcoin_news.json || true
          git add trades.json || true
          if git diff --cached --quiet; then
            echo "No new content to commit"
          else
            git commit -m "auto: daily analysis $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
