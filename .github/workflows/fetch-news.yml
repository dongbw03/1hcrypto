name: Fetch Crypto News & Derivatives Data

on:
  schedule:
    # 北京时间 07:00 和 20:00 运行（留给处理留 30 分钟）
    - cron: '0 23,12 * * *'   # UTC 23:00 = 北京 07:00；UTC 12:00 = 北京 20:00
  workflow_dispatch:  # 允许手动触发

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - name: Install dependencies
        run: pip install requests feedparser pyyaml
      
      - name: Run fetch_derivatives.py（衍生品数据）
        run: python scripts/fetch_derivatives.py
      
      - name: Run fetch_news.py（资讯抓取 + 中英文分别撰写）
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/fetch_news.py
      
      - name: Commit and push new content
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/content/zh/news/ src/content/en/news/ || true
          git add src/data/derivatives.json || true
          if git diff --cached --quiet; then
            echo "No new content to commit"
          else
            git commit -m "auto: fetch news & derivatives $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
