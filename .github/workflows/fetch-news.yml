name: Fetch Crypto News

on:
  schedule:
    # 每天 8:00 和 20:00 (北京时间) 运行
    - cron: '0 0,12 * * *'  # UTC 0:00 和 12:00 = 北京 8:00 和 20:00
  workflow_dispatch:  # 允许手动触发

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Run fetch_news.py
        env:
          DEEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/fetch_news.py
      
      - name: Commit and push new news
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/content/zh/news/ src/content/en/news/ || true
          if git diff --cached --quiet; then
            echo "No new news to commit"
          else
            git commit -m "auto: fetch crypto news $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
