name: News Digest (Every 6 Hours)

on:
  schedule:
    # 每6小时运行一次 (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  news-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - name: Install dependencies
        run: pip install requests feedparser pyyaml
      
      - name: Run fetch_altcoins.py（山寨币行情）
        run: python scripts/fetch_altcoins.py
      
      - name: Run fetch_altcoin_news.py（山寨币新闻）
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/fetch_altcoin_news.py
      
      - name: Run fetch_news.py（资讯抓取 + 中英文分别撰写）
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/fetch_news.py
      
      - name: Run auto_trade.py --check-only（检查止损止盈）
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/auto_trade.py --check-only
      
      - name: Commit and push new content
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/content/zh/news/ src/content/en/news/ || true
          git add src/data/altcoins.json || true
          git add src/data/altcoin_news.json || true
          if git diff --cached --quiet; then
            echo "No new content to commit"
          else
            git commit -m "auto: news digest $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
